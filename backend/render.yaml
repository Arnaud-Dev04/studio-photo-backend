services:
  - type: web
    name: studio-photo-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: CLOUDINARY_URL
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_SERVER
        sync: false
      - key: REDIS_URL
        sync: false
      - key: FIREBASE_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.0"
